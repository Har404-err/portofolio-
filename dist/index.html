    <style>
        :root {
            --neon: #00f0ff;
            --bg: #030712;
        }
        body {
            cursor: none;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            background-color: var(--bg);
        }
        
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;

        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(to right, rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 100px 100px;
            z-index: -1;
            pointer-events: none;
        }

        #custom-cursor {
            width: 8px;
            height: 8px;
            background: var(--neon);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1), height 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.08s linear, background 0.3s;
            transform: translate(-50%, -50%);
        }
        
        #cursor-follower {
            width: 44px;
            height: 44px;
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1), height 0.4s cubic-bezier(0.16, 1, 0.3, 1), left 0.2s cubic-bezier(0.16, 1, 0.3, 1), top 0.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
            transform: translate(-50%, -50%);
        }

        .cursor-hover #custom-cursor {
            width: 100px;
            height: 100px;
            background: var(--neon);
            mix-blend-mode: difference;
        }
        
        .cursor-hover #cursor-follower {
            width: 120px;
            height: 120px;
            opacity: 0;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 10px; border: 1px solid #030712; }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(to right, transparent, rgba(0, 240, 255, 0.1), transparent);
            z-index: 9998;
